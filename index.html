<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Warner Bros. Entertainment — Official Partnership Portal</title>
<meta name="description" content="Partner with Warner Bros. — 102 years of bold storytelling, 12,500+ films, 220+ countries. The world's greatest entertainment studio."/>
<meta property="og:title" content="Warner Bros. Entertainment — Official Partnership Portal"/>
<meta property="og:description" content="102 years of bold storytelling. 12,500+ films. 220+ countries."/>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Playfair Display',Georgia,serif;
  background:#06060b;
  color:#eee8de;
  overflow-x:hidden;
  min-height:100vh;
}
img{display:block;max-width:100%;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#06060b;}
::-webkit-scrollbar-thumb{background:linear-gradient(#9A7828,#C8A84B);border-radius:2px;}

/* ── VARIABLES ── */
:root{
  --gold:#C8A84B;
  --gold-dark:#9A7828;
  --gold-glow:rgba(200,168,75,0.26);
  --bg:#06060b;
  --border:rgba(200,168,75,0.16);
  --muted:#8a7e6e;
  --dim:#5a5040;
  --text:#eee8de;
}

/* ═══════════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-300% center;}100%{background-position:300% center;}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(9px);}}
@keyframes pulseRing{0%{transform:translate(-50%,-50%) scale(1);opacity:.18;}100%{transform:translate(-50%,-50%) scale(1.8);opacity:0;}}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes grain{0%,100%{transform:translate(0,0);}20%{transform:translate(-2%,3%);}40%{transform:translate(2%,-2%);}60%{transform:translate(-1%,2%);}80%{transform:translate(3%,-1%);}}

.anim0{animation:fadeUp .8s ease both;}
.anim1{animation:fadeUp .8s .12s ease both;}
.anim2{animation:fadeUp .8s .28s ease both;}
.anim3{animation:fadeUp .8s .44s ease both;}

/* ═══════════════════════════════════════════════
   GRAIN OVERLAY
═══════════════════════════════════════════════ */
#grain{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.02;
  animation:grain 8s steps(2) infinite;
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  padding:0 5vw;height:74px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .4s,backdrop-filter .4s,border .4s;
}
#nav.scrolled{
  background:rgba(6,6,11,.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.nav-brand{display:flex;align-items:center;gap:14px;cursor:pointer;flex-shrink:0;}
.nav-brand-name{font-size:18px;font-weight:800;letter-spacing:.04em;}
.nav-brand-sub{font-size:9px;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;}
.nav-links{display:flex;align-items:center;gap:28px;}
.nav-links a{font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-weight:600;transition:color .2s;}
.nav-links a:hover{color:var(--gold);}
@media(max-width:900px){.nav-links a:not(.btn-gold){display:none;}}

/* ═══════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════ */
.btn-gold{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 26px;border-radius:2px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:#06060b;border:none;cursor:pointer;
  font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  font-family:'Playfair Display',Georgia,serif;
  box-shadow:0 6px 24px var(--gold-glow);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;
  text-decoration:none;
}
.btn-gold:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 18px 50px rgba(200,168,75,.45);}
.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  padding:17px 44px;border-radius:2px;
  border:1px solid rgba(200,168,75,.38);
  color:var(--gold);background:transparent;cursor:pointer;
  font-weight:600;font-size:15px;
  font-family:'Playfair Display',Georgia,serif;
  text-decoration:none;
  transition:background .22s,border-color .22s;
}
.btn-ghost:hover{background:rgba(200,168,75,.1);border-color:rgba(200,168,75,.65);}
.btn-hero{padding:18px 48px;font-size:15px;}

/* ═══════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════ */
#hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:140px 5vw 100px;
  position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse 100% 70% at 50% -10%,rgba(200,168,75,.11) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%,rgba(13,34,68,.4) 0%,transparent 55%),
    #06060b;
}
.hero-ring{
  position:absolute;top:50%;left:50%;
  border-radius:50%;pointer-events:none;
  border:1px solid rgba(200,168,75,.06);
  transform:translate(-50%,-50%);
}
.pulse-ring{
  position:absolute;top:50%;left:50%;
  width:320px;height:320px;border-radius:50%;
  border:1px solid rgba(200,168,75,.14);
  animation:pulseRing 4s ease-out infinite;
  pointer-events:none;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 18px;border:1px solid rgba(200,168,75,.38);border-radius:20px;
  font-size:11px;color:var(--gold);letter-spacing:.12em;
  background:rgba(200,168,75,.05);
  font-family:'Cormorant Garamond',serif;margin-bottom:32px;
}
.hero-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);}
.h1-plain{
  font-size:clamp(3rem,8.5vw,7rem);
  font-weight:900;line-height:.96;letter-spacing:-.03em;margin-bottom:8px;
}
.h1-gold{
  display:block;
  font-size:clamp(3rem,8.5vw,7rem);
  font-weight:900;line-height:.96;letter-spacing:-.03em;margin-bottom:36px;
  background:linear-gradient(90deg,#9A7828 0%,#e8d080 25%,#C8A84B 50%,#e8d080 75%,#9A7828 100%);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 5s linear infinite;
}
.hero-sub{
  font-size:clamp(1rem,2vw,1.18rem);
  color:var(--muted);max-width:620px;margin:0 auto 52px;
  line-height:1.82;font-style:italic;
  font-family:'Cormorant Garamond',serif;
}
.hero-ctas{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.scroll-hint{
  position:absolute;bottom:38px;
  color:#3a3428;text-decoration:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  font-family:'Cormorant Garamond',serif;
}
.bounce{animation:bounce 2.2s infinite;}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
#stats{
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:rgba(200,168,75,.025);
}
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  max-width:1200px;margin:0 auto;
}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-cell{padding:50px 20px;text-align:center;border-right:1px solid rgba(200,168,75,.12);}
.stat-cell:last-child{border-right:none;}
@media(max-width:700px){.stat-cell:nth-child(2){border-right:none;}}
.stat-ico{font-size:22px;margin-bottom:14px;opacity:.85;}
.stat-val{font-size:clamp(1.9rem,3.5vw,2.7rem);font-weight:900;color:var(--gold);letter-spacing:-.025em;line-height:1;}
.stat-lbl{font-size:13px;color:var(--text);font-weight:600;margin-top:10px;}
.stat-src{font-size:10px;color:var(--dim);margin-top:5px;font-style:italic;}

/* ═══════════════════════════════════════════════
   SECTIONS
═══════════════════════════════════════════════ */
.sec{padding:110px 5vw;}
.sec-inner{max-width:1200px;margin:0 auto;}
.sec-hd{text-align:center;margin-bottom:64px;}
.sec-label{
  font-size:11px;letter-spacing:.22em;color:var(--gold);
  text-transform:uppercase;margin-bottom:14px;
  font-family:'Cormorant Garamond',serif;
}
.sec-title{
  font-size:clamp(1.9rem,4vw,3rem);font-weight:800;
  letter-spacing:-.025em;line-height:1.08;margin-bottom:16px;
}
.sec-title span{color:var(--gold);}
.sec-sub{
  font-size:15px;color:var(--muted);font-style:italic;
  line-height:1.82;font-family:'Cormorant Garamond',serif;
  max-width:540px;margin:0 auto;
}
.sec-alt{
  background:rgba(200,168,75,.022);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.note{text-align:center;font-size:11px;color:#3a3028;font-style:italic;line-height:1.7;}

/* ═══════════════════════════════════════════════
   FILM CARDS — two rows:
   Row 1: 5 cols (non-HP films)
   Row 2: 8 HP films scrollable carousel
═══════════════════════════════════════════════ */

/* ── Main 5-film grid ── */
.films-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;margin-bottom:32px;
}
@media(max-width:1100px){.films-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:650px){.films-grid{grid-template-columns:repeat(2,1fr);gap:12px;}}

/* ── HP Series label ── */
.hp-label{
  display:flex;align-items:center;gap:14px;
  margin-bottom:18px;
}
.hp-label-text{
  font-size:11px;letter-spacing:.18em;color:var(--gold);
  text-transform:uppercase;font-family:'Cormorant Garamond',serif;white-space:nowrap;
}
.hp-label-line{flex:1;height:1px;background:rgba(200,168,75,.18);}

/* ── HP 8-film horizontal scroll ── */
.hp-scroll-wrap{
  overflow-x:auto;
  padding-bottom:12px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:var(--gold-dark) #0a0a10;
}
.hp-scroll-wrap::-webkit-scrollbar{height:4px;}
.hp-scroll-wrap::-webkit-scrollbar-track{background:#0a0a10;}
.hp-scroll-wrap::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:2px;}
.hp-grid{
  display:grid;
  grid-template-columns:repeat(8,minmax(160px,1fr));
  gap:14px;
  min-width:1320px;
}

/* ── Film card shared ── */
.film-card{
  position:relative;border-radius:8px;overflow:hidden;
  cursor:pointer;aspect-ratio:2/3;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s;
}
.film-card:hover{
  transform:translateY(-8px) scale(1.025);
  box-shadow:0 28px 60px rgba(0,0,0,.7),0 0 0 1px rgba(200,168,75,.45);
}
.film-card img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .5s ease;
}
.film-card:hover img{transform:scale(1.06);}
.film-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent 0%,rgba(0,0,0,.93) 100%);
  padding:44px 12px 12px;
}
.film-genre{font-size:9px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;}
.film-title{font-size:12px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:4px;}
.film-meta{display:flex;align-items:center;justify-content:space-between;}
.film-year{font-size:10px;color:rgba(255,255,255,.45);}
.film-rating{font-size:10px;color:var(--gold);}
/* Hover reveal */
.film-hover{
  position:absolute;inset:0;
  background:rgba(0,0,0,.78);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;text-align:center;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.film-card:hover .film-hover{opacity:1;pointer-events:auto;}
.film-play{
  width:40px;height:40px;border-radius:50%;
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;font-size:14px;color:var(--gold);
}
.film-htitle{font-size:12px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3;}
.film-htag{font-size:10px;color:var(--gold);font-style:italic;line-height:1.5;}
/* Fallback */
.film-fallback{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;text-align:center;
}

/* Filmstrip */
.filmstrip{display:flex;gap:4px;align-items:center;justify-content:center;opacity:.2;margin:36px 0 20px;}
.fhole{width:8px;height:10px;border-radius:1px;background:var(--gold);}

/* ═══════════════════════════════════════════════
   FOUNDERS
═══════════════════════════════════════════════ */
.founder-tabs{display:flex;gap:10px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
.ftab{
  padding:10px 24px;border-radius:2px;
  border:1px solid var(--border);background:transparent;
  color:#6a6050;font-size:14px;cursor:pointer;
  font-family:'Playfair Display',Georgia,serif;transition:all .2s;
}
.ftab.active{border-color:var(--gold);background:rgba(200,168,75,.12);color:var(--gold);font-weight:700;}
.ftab:hover:not(.active){border-color:rgba(200,168,75,.4);color:var(--gold);}
.fpanel{display:none;animation:fadeUp .45s ease both;}
.fpanel.active{display:block;}
.fcard{
  padding:40px 44px;
  border:1px solid var(--border);border-left:3px solid var(--gold);
  border-radius:4px;background:rgba(200,168,75,.04);
  display:flex;align-items:flex-start;gap:26px;
}
@media(max-width:580px){.fcard{flex-direction:column;align-items:center;text-align:center;padding:28px 20px;}}
.favatar{
  width:80px;height:80px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:22px;color:#06060b;
  box-shadow:0 10px 30px rgba(200,168,75,.25);
}
.fname{font-size:22px;font-weight:800;margin-bottom:3px;}
.frole{font-size:11px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.fborn{font-size:12px;color:var(--dim);font-style:italic;margin-bottom:16px;}
.fbio{font-size:clamp(.95rem,1.8vw,1.08rem);color:var(--muted);line-height:1.85;font-style:italic;font-family:'Cormorant Garamond',serif;}

/* ═══════════════════════════════════════════════
   MILESTONE
═══════════════════════════════════════════════ */
.ms-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px;}
.ms-btn{
  padding:8px 18px;border-radius:2px;
  border:1px solid var(--border);background:transparent;
  color:#6a6050;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Playfair Display',Georgia,serif;transition:all .2s;
}
.ms-btn.active{border-color:var(--gold);background:rgba(200,168,75,.12);color:var(--gold);}
.ms-btn:hover:not(.active){border-color:rgba(200,168,75,.4);color:var(--gold);}
.ms-panel{display:none;animation:fadeUp .4s ease both;}
.ms-panel.active{display:block;}
.ms-card{
  padding:44px 48px;max-width:900px;margin:0 auto;
  border:1px solid var(--border);border-left:3px solid var(--gold);
  border-radius:4px;background:rgba(200,168,75,.04);
}
@media(max-width:580px){.ms-card{padding:28px 20px;}}
.ms-year{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:900;color:var(--gold);margin-bottom:18px;letter-spacing:-.025em;}
.ms-event{font-size:clamp(1rem,2vw,1.18rem);color:var(--muted);line-height:1.88;font-style:italic;font-family:'Cormorant Garamond',serif;}

/* ═══════════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════════ */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:900px){.svc-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:580px){.svc-grid{grid-template-columns:1fr;}}
.svc-card{
  padding:32px 28px;border-radius:6px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.012);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.svc-card:hover{
  border-color:rgba(200,168,75,.45);background:rgba(200,168,75,.07);
  transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.4);
}
.svc-icon{
  width:52px;height:52px;border-radius:6px;
  background:rgba(200,168,75,.08);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin-bottom:22px;transition:background .3s;
}
.svc-card:hover .svc-icon{background:rgba(200,168,75,.18);}
.svc-title{font-size:17px;font-weight:700;margin-bottom:10px;transition:color .3s;}
.svc-card:hover .svc-title{color:#e8c96a;}
.svc-desc{font-size:14px;color:var(--muted);line-height:1.82;font-style:italic;font-family:'Cormorant Garamond',serif;}

/* ═══════════════════════════════════════════════
   LEADERSHIP
═══════════════════════════════════════════════ */
.ldr-card{
  max-width:900px;margin:0 auto;
  padding:52px 56px;
  border:1px solid var(--border);border-radius:6px;
  background:rgba(200,168,75,.03);
  display:flex;align-items:center;gap:40px;flex-wrap:wrap;
}
@media(max-width:600px){.ldr-card{padding:32px 20px;flex-direction:column;text-align:center;}}
.ldr-left{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:14px;}
.ldr-avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:24px;color:#06060b;
  box-shadow:0 12px 36px rgba(200,168,75,.28);
}
.ldr-name{
  font-size:26px;font-weight:900;margin-bottom:6px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.ldr-badge{
  font-size:10px;padding:4px 12px;border-radius:20px;
  border:1px solid rgba(200,168,75,.35);color:var(--gold);
  background:rgba(200,168,75,.05);letter-spacing:.08em;
}
.ldr-role{font-size:11px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px;}
.ldr-bio{font-size:clamp(1rem,1.8vw,1.08rem);color:var(--muted);line-height:1.88;font-style:italic;font-family:'Cormorant Garamond',serif;}
.ldr-src{font-size:11px;color:var(--dim);margin-top:16px;font-style:italic;}

/* ═══════════════════════════════════════════════
   CONTACT
═══════════════════════════════════════════════ */
#contact{
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%,rgba(200,168,75,.06) 0%,transparent 60%),
    #06060b;
  border-top:1px solid var(--border);
}
.form-wrap{max-width:700px;margin:0 auto;}
.form-box{
  border:1px solid var(--border);border-radius:6px;
  padding:clamp(28px,6vw,52px) clamp(20px,5vw,48px);
  background:rgba(255,255,255,.012);
  display:flex;flex-direction:column;gap:22px;
}
.form-lbl{font-size:10px;color:var(--dim);letter-spacing:.16em;display:block;margin-bottom:10px;text-transform:uppercase;font-family:'Cormorant Garamond',serif;}
.form-fw{position:relative;}
.form-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#4a4030;font-size:15px;pointer-events:none;}
.form-input{
  width:100%;padding:14px 16px 14px 44px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:2px;
  color:var(--text);font-size:15px;
  font-family:'Playfair Display',Georgia,serif;
  transition:border-color .2s,box-shadow .2s;
}
.form-input:focus{border-color:rgba(200,168,75,.6);outline:none;box-shadow:0 0 0 3px rgba(200,168,75,.08);}
