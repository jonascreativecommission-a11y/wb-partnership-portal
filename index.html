<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Warner Bros. Entertainment &mdash; Official Partnership Portal</title>
<meta name="description" content="Partner with Warner Bros. &mdash; 102 years of bold storytelling, 12,500+ films, 220+ countries."/>

<!-- Fonts: display=swap prevents render-blocking on slow connections -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

<style>
/* =========================================================
   RESET
========================================================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Playfair Display',Georgia,serif;
  background:#07070d;
  color:#edeae0;
  overflow-x:hidden;
  min-height:100vh;
  /* CRITICAL: ensure body is never invisible */
  opacity:1 !important;
  visibility:visible !important;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%;height:auto}
button{font-family:inherit;cursor:pointer}

/* =========================================================
   CSS VARIABLES
========================================================= */
:root{
  --g:#C8A84B;
  --gd:#9A7828;
  --ge:rgba(200,168,75,.25);
  --bg:#07070d;
  --bd:rgba(200,168,75,.16);
  --mu:#8a7e6e;
  --dm:#5a5040;
  --tx:#edeae0;
}

/* =========================================================
   SCROLLBAR
========================================================= */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--gd),var(--g));border-radius:2px}

/* =========================================================
   KEYFRAMES  (no opacity tricks that can cause black screen)
========================================================= */
@keyframes shimmer{
  0%{background-position:-300% center}
  100%{background-position:300% center}
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(8px)}
}
@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);opacity:.18}
  100%{transform:translate(-50%,-50%) scale(1.9);opacity:0}
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* =========================================================
   NAVIGATION
========================================================= */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:900;
  display:flex;align-items:center;justify-content:space-between;
  height:72px;padding:0 5vw;
  transition:background .35s,backdrop-filter .35s,border-color .35s;
  border-bottom:1px solid transparent;
}
#nav.stuck{
  background:rgba(7,7,13,.96);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-color:var(--bd);
}
.nav-logo{display:flex;align-items:center;gap:13px;flex-shrink:0}
.nav-logo-text{line-height:1.1}
.nav-logo-main{font-size:17px;font-weight:800;letter-spacing:.04em;color:var(--tx)}
.nav-logo-sub{font-size:9px;color:var(--g);letter-spacing:.22em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:26px}
.nav-link{
  font-size:11px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;
  font-family:'Cormorant Garamond',serif;font-weight:600;
  transition:color .2s;display:none;
}
.nav-link:hover{color:var(--g)}
@media(min-width:860px){.nav-link{display:inline}}

/* =========================================================
   BUTTONS
========================================================= */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  border:none;cursor:pointer;
  font-family:'Playfair Display',Georgia,serif;
  font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  transition:transform .2s,box-shadow .2s;
  text-decoration:none;
}
.btn-primary{
  background:linear-gradient(135deg,var(--g),var(--gd));
  color:#07070d;padding:13px 26px;border-radius:2px;
  font-size:12px;box-shadow:0 6px 22px var(--ge);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 42px rgba(200,168,75,.42)}
.btn-primary.lg{padding:17px 44px;font-size:14px}
.btn-outline{
  background:transparent;color:var(--g);
  border:1px solid rgba(200,168,75,.4);
  padding:17px 44px;border-radius:2px;font-size:14px;font-weight:600;
  transition:background .2s,border-color .2s;
}
.btn-outline:hover{background:rgba(200,168,75,.09);border-color:rgba(200,168,75,.7)}

/* =========================================================
   HERO
========================================================= */
#hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:130px 5vw 90px;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse 100% 65% at 50% -8%,rgba(200,168,75,.10) 0%,transparent 58%),
    radial-gradient(ellipse 55% 45% at 82% 82%,rgba(13,30,65,.45) 0%,transparent 52%),
    var(--bg);
}
/* rings */
.ring{
  position:absolute;top:50%;left:50%;border-radius:50%;pointer-events:none;
  border:1px solid rgba(200,168,75,.055);transform:translate(-50%,-50%);
}
.pulse{
  position:absolute;top:50%;left:50%;width:300px;height:300px;border-radius:50%;
  border:1px solid rgba(200,168,75,.13);
  animation:pulse 4s ease-out infinite;pointer-events:none;
}
.hero-chip{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 18px;border:1px solid rgba(200,168,75,.35);border-radius:20px;
  font-size:11px;color:var(--g);letter-spacing:.11em;
  background:rgba(200,168,75,.05);
  font-family:'Cormorant Garamond',serif;margin-bottom:30px;
}
.chip-dot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0}
.hero-h1{
  font-size:clamp(2.8rem,8vw,6.8rem);
  font-weight:900;line-height:.95;letter-spacing:-.03em;margin-bottom:8px;
}
.hero-h1-shine{
  display:block;
  font-size:clamp(2.8rem,8vw,6.8rem);
  font-weight:900;line-height:.95;letter-spacing:-.03em;margin-bottom:34px;
  background:linear-gradient(90deg,#9A7828 0%,#e8d080 28%,#C8A84B 52%,#e8d080 76%,#9A7828 100%);
  background-size:300% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  animation:shimmer 5s linear infinite;
}
.hero-sub{
  font-size:clamp(1rem,2vw,1.16rem);color:var(--mu);
  max-width:620px;margin:0 auto 50px;
  line-height:1.82;font-style:italic;
  font-family:'Cormorant Garamond',serif;
}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.scroll-cue{
  position:absolute;bottom:36px;
  color:#383028;display:flex;flex-direction:column;align-items:center;gap:5px;
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  font-family:'Cormorant Garamond',serif;
}
.arrow-bounce{animation:bounce 2.2s infinite}

/* =========================================================
   STATS
========================================================= */
#stats{
  border-top:1px solid var(--bd);
  border-bottom:1px solid var(--bd);
  background:rgba(200,168,75,.022);
}
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  max-width:1180px;margin:0 auto;
}
@media(max-width:680px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat{
  padding:50px 18px;text-align:center;
  border-right:1px solid rgba(200,168,75,.11);
}
.stat:last-child{border-right:none}
@media(max-width:680px){.stat:nth-child(2){border-right:none}}
.stat-ico{font-size:22px;margin-bottom:13px}
.stat-val{
  font-size:clamp(1.8rem,3.2vw,2.6rem);
  font-weight:900;color:var(--g);letter-spacing:-.02em;line-height:1;
}
.stat-lbl{font-size:13px;color:var(--tx);font-weight:600;margin-top:9px}
.stat-src{font-size:10px;color:var(--dm);margin-top:5px;font-style:italic}

/* =========================================================
   SECTION HELPERS
========================================================= */
.sec{padding:100px 5vw}
.sec-in{max-width:1180px;margin:0 auto}
.sec-alt{
  background:rgba(200,168,75,.02);
  border-top:1px solid var(--bd);
  border-bottom:1px solid var(--bd);
}
.sec-head{text-align:center;margin-bottom:60px}
.sec-tag{
  font-size:11px;letter-spacing:.22em;color:var(--g);
  text-transform:uppercase;margin-bottom:13px;
  font-family:'Cormorant Garamond',serif;
}
.sec-title{
  font-size:clamp(1.8rem,3.8vw,2.85rem);
  font-weight:800;letter-spacing:-.025em;line-height:1.08;margin-bottom:14px;
}
.sec-title .au{color:var(--g)}
.sec-body{
  font-size:15px;color:var(--mu);font-style:italic;
  line-height:1.82;font-family:'Cormorant Garamond',serif;
  max-width:530px;margin:0 auto;
}
.note{text-align:center;font-size:11px;color:#3a3025;font-style:italic;line-height:1.7}

/* =========================================================
   FILMS — main 5
========================================================= */
.films-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;margin-bottom:28px;
}
@media(max-width:1080px){.films-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:620px){.films-row{grid-template-columns:repeat(2,1fr);gap:10px}}

/* HP section divider */
.hp-bar{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.hp-bar-line{flex:1;height:1px;background:rgba(200,168,75,.17)}
.hp-bar-text{
  font-size:10px;letter-spacing:.16em;color:var(--g);
  text-transform:uppercase;font-family:'Cormorant Garamond',serif;white-space:nowrap;
}

/* HP 8-film horizontal scroller */
.hp-scroller{
  overflow-x:auto;padding-bottom:10px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--gd) #0a0a12;
}
.hp-scroller::-webkit-scrollbar{height:3px}
.hp-scroller::-webkit-scrollbar-track{background:#0a0a12}
.hp-scroller::-webkit-scrollbar-thumb{background:var(--gd);border-radius:2px}
.hp-inner{
  display:grid;
  grid-template-columns:repeat(8,minmax(148px,1fr));
  gap:12px;min-width:1210px;
}

/* shared film card */
.fc{
  position:relative;border-radius:7px;overflow:hidden;
  aspect-ratio:2/3;cursor:pointer;
  box-shadow:0 8px 22px rgba(0,0,0,.52);
  transition:transform .38s cubic-bezier(.34,1.56,.64,1),box-shadow .38s;
}
.fc:hover{
  transform:translateY(-7px) scale(1.025);
  box-shadow:0 26px 58px rgba(0,0,0,.72),0 0 0 1px rgba(200,168,75,.42);
}
.fc img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .45s;
}
.fc:hover img{transform:scale(1.06)}
.fc-fallback{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px;text-align:center;
}
.fc-bar{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.92));
  padding:40px 12px 12px;
}
.fc-genre{font-size:9px;color:var(--g);letter-spacing:.13em;text-transform:uppercase;margin-bottom:3px}
.fc-title{font-size:12px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:3px}
.fc-row{display:flex;align-items:center;justify-content:space-between}
.fc-year{font-size:10px;color:rgba(255,255,255,.42)}
.fc-star{font-size:10px;color:var(--g)}
/* hover overlay */
.fc-hov{
  position:absolute;inset:0;
  background:rgba(0,0,0,.76);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px;text-align:center;
  opacity:0;transition:opacity .28s;pointer-events:none;
}
.fc:hover .fc-hov{opacity:1;pointer-events:auto}
.fc-play{
  width:40px;height:40px;border-radius:50%;
  border:2px solid var(--g);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;color:var(--g);font-size:14px;
}
.fc-htitle{font-size:12px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.fc-htag{font-size:10px;color:var(--g);font-style:italic;line-height:1.5}

/* filmstrip */
.strip{display:flex;gap:4px;align-items:center;justify-content:center;opacity:.18;margin:34px 0 18px}
.sh{width:8px;height:10px;border-radius:1px;background:var(--g)}

/* =========================================================
   FOUNDERS
========================================================= */
.ftabs{display:flex;gap:9px;justify-content:center;margin-bottom:30px;flex-wrap:wrap}
.ftab{
  padding:9px 22px;border-radius:2px;
  border:1px solid var(--bd);background:transparent;
  color:#6a5e4a;font-size:14px;font-weight:400;
  font-family:'Playfair Display',Georgia,serif;
  transition:all .2s;
}
.ftab.on{border-color:var(--g);background:rgba(200,168,75,.11);color:var(--g);font-weight:700}
.ftab:hover:not(.on){border-color:rgba(200,168,75,.38);color:var(--g)}
.fpanel{display:none}
.fpanel.on{display:block;animation:slideUp .42s ease both}
.fcard{
  padding:38px 42px;
  border:1px solid var(--bd);border-left:3px solid var(--g);
  border-radius:4px;background:rgba(200,168,75,.035);
  display:flex;align-items:flex-start;gap:24px;
}
@media(max-width:560px){.fcard{flex-direction:column;align-items:center;text-align:center;padding:26px 18px}}
.favatar{
  width:76px;height:76px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:21px;color:#07070d;
  box-shadow:0 8px 26px rgba(200,168,75,.22);
}
.fname{font-size:21px;font-weight:800;margin-bottom:3px}
.frole{font-size:11px;color:var(--g);letter-spacing:.11em;text-transform:uppercase;margin-bottom:3px}
.fborn{font-size:12px;color:var(--dm);font-style:italic;margin-bottom:14px}
.fbio{
  font-size:clamp(.95rem,1.7vw,1.06rem);
  color:var(--mu);line-height:1.85;font-style:italic;
  font-family:'Cormorant Garamond',serif;
}

/* =========================================================
   TIMELINE
========================================================= */
.mbtns{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:30px}
.mbtn{
  padding:7px 16px;border-radius:2px;
  border:1px solid var(--bd);background:transparent;
  color:#6a5e4a;font-size:13px;font-weight:600;
  font-family:'Playfair Display',Georgia,serif;
  transition:all .2s;
}
.mbtn.on{border-color:var(--g);background:rgba(200,168,75,.11);color:var(--g)}
.mbtn:hover:not(.on){border-color:rgba(200,168,75,.38);color:var(--g)}
.mpanel{display:none}
.mpanel.on{display:block;animation:slideUp .38s ease both}
.mcard{
  padding:42px 46px;max-width:880px;margin:0 auto;
  border:1px solid var(--bd);border-left:3px solid var(--g);
  border-radius:4px;background:rgba(200,168,75,.035);
}
@media(max-width:560px){.mcard{padding:26px 18px}}
.myear{
  font-size:clamp(2rem,4.8vw,3.2rem);
  font-weight:900;color:var(--g);margin-bottom:16px;letter-spacing:-.025em;
}
.mevent{
  font-size:clamp(.98rem,1.9vw,1.15rem);
  color:var(--mu);line-height:1.88;font-style:italic;
  font-family:'Cormorant Garamond',serif;
}

/* =========================================================
   SERVICES
========================================================= */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:880px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.svc-grid{grid-template-columns:1fr}}
.svc{
  padding:30px 26px;border-radius:6px;
  border:1px solid var(--bd);background:rgba(255,255,255,.01);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.svc:hover{
  border-color:rgba(200,168,75,.44);background:rgba(200,168,75,.06);
  transform:translateY(-4px);box-shadow:0 14px 44px rgba(0,0,0,.38);
}
.svc-ico{
  width:50px;height:50px;border-radius:6px;
  background:rgba(200,168,75,.07);
  display:flex;align-items:center;justify-content:center;
  font-size:23px;margin-bottom:20px;transition:background .3s;
}
.svc:hover .svc-ico{background:rgba(200,168,75,.17)}
.svc-title{font-size:16px;font-weight:700;margin-bottom:9px;transition:color .3s}
.svc:hover .svc-title{color:#e8c96a}
.svc-desc{font-size:14px;color:var(--mu);line-height:1.8;font-style:italic;font-family:'Cormorant Garamond',serif}

/* =========================================================
   LEADERSHIP
========================================================= */
.lcard{
  max-width:880px;margin:0 auto;
  padding:50px 54px;
  border:1px solid var(--bd);border-radius:6px;background:rgba(200,168,75,.025);
  display:flex;align-items:center;gap:36px;flex-wrap:wrap;
}
@media(max-width:580px){.lcard{padding:30px 18px;flex-direction:column;text-align:center}}
.lleft{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:12px}
.lavatar{
  width:78px;height:78px;border-radius:50%;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:22px;color:#07070d;
  box-shadow:0 10px 32px rgba(200,168,75,.25);
}
.lname{
  font-size:24px;font-weight:900;margin-bottom:5px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.lbadge{
  font-size:10px;padding:3px 11px;border-radius:20px;
  border:1px solid rgba(200,168,75,.32);color:var(--g);
  background:rgba(200,168,75,.05);letter-spacing:.07em;
}
.lrole{font-size:11px;color:var(--g);letter-spacing:.11em;text-transform:uppercase;margin-bottom:18px}
.lbio{
  font-size:clamp(.95rem,1.7vw,1.06rem);
  color:var(--mu);line-height:1.88;font-style:italic;
  font-family:'Cormorant Garamond',serif;
}
.lsrc{font-size:11px;color:var(--dm);margin-top:14px;font-style:italic}

/* =========================================================
   CONTACT
========================================================= */
#contact{
  background:
    radial-gradient(ellipse 80% 55% at 50% 100%,rgba(200,168,75,.055) 0%,transparent 58%),
    var(--bg);
  border-top:1px solid var(--bd);
}
.form-wrap{max-width:680px;margin:0 auto}
.fbox{
  border:1px solid var(--bd);border-radius:6px;
  padding:clamp(26px,5vw,50px) clamp(18px,5vw,46px);
  background:rgba(255,255,255,.01);
  display:flex;flex-direction:column;gap:20px;
}
.flbl{
  font-size:10px;color:var(--dm);letter-spacing:.15em;
  display:block;margin-bottom:9px;text-transform:uppercase;
  font-family:'Cormorant Garamond',serif;
}
.fwrap{position:relative}
.fico{
  position:absolute;left:15px;top:50%;transform:translateY(-50%);
  color:#48402e;font-size:14px;pointer-events:none;
}
.finput{
  width:100%;padding:13px 14px 13px 42px;
  background:rgba(255,255,255,.035);
  border:1px solid var(--bd);border-radius:2px;
  color:var(--tx);font-size:15px;
  font-family:'Playfair Display',Georgia,serif;
  transition:border-color .2s,box-shadow .2s;
}
.finput:focus{
  border-color:rgba(200,168,75,.58);outline:none;
  box-shadow:0 0 0 3px rgba(200,168,75,.08);
}
.finput::placeholder{color:#2c2418}
.ftarea{
  width:100%;padding:13px 14px;
  background:rgba(255,255,255,.035);
  border:1px solid var(--bd);border-radius:2px;
  color:var(--tx);font-size:15px;
  font-family:'Playfair Display',Georgia,serif;
  resize:vertical;min-height:128px;
  transition:border-color .2s,box-shadow .2s;
}
.ftarea:focus{
  border-color:rgba(200,168,75,.58);outline:none;
  box-shadow:0 0 0 3px rgba(200,168,75,.08);
}
.ftarea::placeholder{color:#2c2418}
.success{
  display:none;
  padding:66px 40px;text-align:center;
  border:1px solid rgba(200,168,75,.3);border-radius:6px;
  background:rgba(200,168,75,.045);
  animation:slideUp .45s ease both;
}
.success-ico{font-size:52px;margin-bottom:20px}
.success-title{font-size:24px;font-weight:700;margin-bottom:10px}
.success-sub{color:var(--mu);font-style:italic;font-size:15px}

/* =========================================================
   FOOTER
========================================================= */
footer{
  border-top:1px solid var(--bd);
  padding:42px 5vw;background:var(--bg);overflow:hidden;
}
.foot-top{
  display:flex;justify-content:space-between;align-items:ce
