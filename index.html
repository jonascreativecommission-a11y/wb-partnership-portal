<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warner Bros. | Partnership Portal</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600&display=swap');
        body { margin: 0; background: #06060b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Kinukuha natin ang React hooks at Lucide icons para maging available sa code mo
        const { useState, useEffect, useRef } = React;
        const { 
            ArrowRight, Mail, Phone, User, CheckCircle, ChevronDown, Play, 
            Award, Film, Globe, Users, Tv, Zap, Shield, TrendingUp, 
            BookOpen, Star, ExternalLink 
        } = lucide;

        /* --- DATA FROM YOUR CODE --- */
        const FILMS = [
          { title: "Harry Potter and the Sorcerer's Stone", year: "2001", genre: "Fantasy", rating: "7.9", poster: "https://image.tmdb.org/t/p/w500/wuMc08IPKEatf9rnMNXvIDxqP4W.jpg", tagline: "Let the Magic Begin", color: "#740001" },
          { title: "The Dark Knight", year: "2008", genre: "Action · Crime", rating: "9.0", poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", tagline: "Why So Serious?", color: "#1a1a2e" },
          { title: "Barbie", year: "2023", genre: "Comedy · Fantasy", rating: "7.1", poster: "https://image.tmdb.org/t/p/w500/iuFNMS8vlbhzY9SnDY1c71AXQRV.jpg", tagline: "She's Everything. He's Just Ken.", color: "#e91e8c" },
          { title: "The Matrix", year: "1999", genre: "Sci-Fi · Action", rating: "8.7", poster: "https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg", tagline: "Free Your Mind", color: "#003300" },
          { title: "Inception", year: "2010", genre: "Thriller · Sci-Fi", rating: "8.4", poster: "https://image.tmdb.org/t/p/w500/oYuLEt3zVCKq57qu2F8dT7NIa6f.jpg", tagline: "Your Mind is the Scene of the Crime", color: "#0d1b3e" },
          { title: "Goodfellas", year: "1990", genre: "Crime · Drama", rating: "8.7", poster: "https://image.tmdb.org/t/p/w500/aKuFiU82s5ISJpGZp7YkIr3kCUd.jpg", tagline: "As Far Back as I Can Remember...", color: "#1a0a00" },
          { title: "Casablanca", year: "1942", genre: "Drama · Romance", rating: "8.5", poster: "https://image.tmdb.org/t/p/w500/5K7cOHoay2mZusSLezBOY0Qxh8a.jpg", tagline: "Of all the gin joints...", color: "#2c1810" },
          { title: "Dune", year: "2021", genre: "Epic · Sci-Fi", rating: "7.8", poster: "https://image.tmdb.org/t/p/w500/d5NXSklpcKxYKqHmDTFYkJoaEkO.jpg", tagline: "Beyond Fear, Destiny Awaits", color: "#8B6914" }
        ];

        const STATS = [
          { value: "102", label: "Years of Cinema", sub: "Est. April 4, 1923", icon: Award },
          { value: "12,500+", label: "Films in Library", sub: "Variety · Centennial 2023", icon: Film },
          { value: "220+", label: "Countries Reached", sub: "WBD Official", icon: Globe },
          { value: "35,000", label: "Employees Worldwide", sub: "Macrotrends 2024", icon: Users }
        ];

        const WBShieldSVG = ({ size = 52 }) => (
          <svg width={size} height={size * 1.05} viewBox="0 0 200 210" fill="none">
            <path d="M100 4 L192 30 L192 110 Q192 175 100 206 Q8 175 8 110 L8 30 Z" fill="#C8A84B" />
            <path d="M100 14 L182 37 L182 110 Q182 168 100 196 Q18 168 18 110 L18 37 Z" fill="#1a3a6b" />
            <text x="100" y="110" textAnchor="middle" fontFamily="serif" fontWeight="900" fontSize="22" fill="#0d2244">WARNER BROS.</text>
          </svg>
        );

        /* --- COMPONENTS --- */
        function FilmCard({ film, index }) {
          const [hovered, setHovered] = useState(false);
          return (
            <div 
              onMouseEnter={() => setHovered(true)}
              onMouseLeave={() => setHovered(false)}
              className="relative rounded-lg overflow-hidden cursor-pointer transition-all duration-500"
              style={{ 
                aspectRatio: '2/3', 
                backgroundColor: film.color,
                transform: hovered ? 'translateY(-10px) scale(1.02)' : 'none',
                boxShadow: hovered ? '0 20px 40px rgba(0,0,0,0.6)' : 'none'
              }}
            >
              <img src={film.poster} className="w-full h-full object-cover" />
              <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent p-4 flex flex-col justify-end">
                <p className="text-[10px] text-yellow-500 uppercase tracking-widest">{film.genre}</p>
                <h3 className="font-bold text-sm leading-tight">{film.title}</h3>
                <div className="flex justify-between items-center mt-1">
                  <span className="text-[10px] opacity-60">{film.year}</span>
                  <span className="text-[10px] text-yellow-500 flex items-center gap-1"><Star size={8} fill="currentColor"/> {film.rating}</span>
                </div>
              </div>
            </div>
          );
        }

        /* --- MAIN APP --- */
        function WarnerBrosWebsite() {
          return (
            <div className="min-h-screen text-[#eee8de] font-['Inter'] pb-20">
              {/* Custom CSS classes for your design */}
              <style>{`
                .playfair { font-family: 'Playfair Display', serif; }
                .gold-shimmer {
                  background: linear-gradient(90deg, #9A7828 0%, #e8d080 50%, #9A7828 100%);
                  background-size: 200% auto;
                  -webkit-background-clip: text;
                  -webkit-text-fill-color: transparent;
                  animation: shimmer 5s linear infinite;
                }
                @keyframes shimmer { to { background-position: 200% center; } }
              `}</style>

              {/* Navigation */}
              <nav className="flex justify-between items-center p-6 max-w-7xl mx-auto">
                <WBShieldSVG size={40} />
                <button className="border border-[#C8A84B] px-5 py-1.5 text-xs gold-text hover:bg-[#C8A84B] hover:text-black transition uppercase tracking-widest">Partner With Us</button>
              </nav>

              {/* Hero */}
              <header className="text-center py-20 px-4">
                <p className="text-[10px] tracking-[0.4em] text-[#C8A84B] uppercase mb-4">A Global Legacy Since 1923</p>
                <h1 className="text-5xl md:text-8xl font-black playfair mb-6 leading-tight">
                  A Century of <br/><span className="italic gold-shimmer">Bold Storytelling</span>
                </h1>
                <p className="max-w-2xl mx-auto text-gray-400 italic text-sm md:text-base leading-relaxed opacity-80">
                  "To produce and distribute blockbusters worldwide." For over a century, Warner Bros. has remained the vanguard of global culture.
                </p>
              </header>

              {/* Stats Section */}
              <section className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-6xl mx-auto px-6 mb-24">
                {STATS.map((stat, i) => (
                  <div key={i} className="bg-white/5 border border-white/10 p-8 text-center rounded-sm hover:border-yellow-600/50 transition">
                    <div className="text-3xl font-bold text-[#C8A84B] playfair">{stat.value}</div>
                    <div className="text-[10px] tracking-widest uppercase mt-2 opacity-50">{stat.label}</div>
                  </div>
                ))}
              </section>

              {/* Films Grid */}
              <section className="max-w-7xl mx-auto px-6">
                <h2 className="text-2xl playfair italic mb-10 border-b border-white/10 pb-4">Iconic <span className="text-[#C8A84B]">Masterpieces</span></h2>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                  {FILMS.map((film, i) => (
                    <FilmCard key={i} film={film} index={i} />
                  ))}
                </div>
              </section>

              <footer className="text-center mt-32 opacity-30 text-[9px] tracking-[0.3em] uppercase">
                © 2026 Warner Bros. Discovery — Global Partnership Portal
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WarnerBrosWebsite />);
    </script>
</body>
</html>
